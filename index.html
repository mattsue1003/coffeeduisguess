
<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>世界咖啡館 ‧ 共學共創</title>
<style>
:root{--grn:#2E5A3E;--grn2:#3F9E5B;--gold:#C8891F;--ink:#2b2b28;--mut:#6b6b63;--bg:#eef4f2;--card:#fff;--red:#C0392B;--line:#dfe7e4}
*{box-sizing:border-box}html,body{margin:0;padding:0;height:100%}
body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;background:linear-gradient(180deg,#f2f8f6,#e9f2ef);color:var(--ink);line-height:1.5;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
.stage{max-width:1000px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:20px 20px calc(96px + env(safe-area-inset-bottom))}
.top{display:flex;align-items:center;gap:10px;color:var(--grn);font-weight:800;font-size:16px;margin-bottom:6px}
.top .sp{margin-left:auto;font-size:14px;color:var(--mut);font-weight:700}
.card{background:var(--card);border-radius:22px;box-shadow:0 8px 26px rgba(20,80,66,.12);padding:30px 30px;flex:1;display:flex;flex-direction:column;justify-content:center}
.chip{display:inline-block;color:#fff;font-weight:800;font-size:17px;padding:7px 16px;border-radius:22px}
.qn{font-size:20px;color:var(--mut);font-weight:800;margin:14px 0 2px}
.qtext{font-size:56px;font-weight:800;color:var(--ink);line-height:1.26;margin:10px 0 22px}
.memo{background:#fbf3e0;border:2px solid var(--gold);border-radius:16px;padding:14px 18px;font-size:18px;color:#8a6512;font-weight:700}
.timerwrap{display:flex;flex-direction:column;align-items:center;margin-top:20px}
.timer{font-size:96px;font-weight:800;color:var(--grn);font-variant-numeric:tabular-nums;letter-spacing:2px;line-height:1}
.timer.low{color:var(--red)}
.timer.done{color:var(--red);animation:flash .6s infinite}
@keyframes flash{50%{opacity:.35}}
.tbtns{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap;justify-content:center}
.btn{border:none;cursor:pointer;font-family:inherit;font-weight:800;border-radius:14px;transition:.12s;font-size:18px;padding:14px 26px;-webkit-appearance:none}
.btn:active{transform:translateY(1px)}
.start{background:var(--grn2);color:#fff;box-shadow:0 4px 12px rgba(63,158,91,.35)}
.start.pause{background:var(--gold)}
.reset{background:#fff;color:var(--grn);border:2px solid var(--grn2)}
.nextst{background:var(--grn);color:#fff}
.big{font-size:46px;font-weight:800;color:var(--grn);line-height:1.25;margin:0 0 8px}
.lead{font-size:22px;color:var(--ink);line-height:1.6}
.steps{list-style:none;padding:0;margin:16px 0 0}
.steps li{display:flex;gap:14px;align-items:flex-start;margin:14px 0;font-size:22px}
.num{flex:0 0 auto;width:40px;height:40px;border-radius:50%;background:var(--grn);color:#fff;display:grid;place-items:center;font-weight:800;font-size:18px}
.hl{color:var(--gold);font-weight:800}
.nav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 18px calc(9px + env(safe-area-inset-bottom));backdrop-filter:blur(6px)}
.nav .navbtn{flex:0 0 auto;background:var(--grn);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;padding:8px 16px;cursor:pointer;font-family:inherit;opacity:.9}
.nav .navbtn.ghost{background:#fff;color:var(--grn);border:2px solid var(--grn)}
.nav .navbtn:disabled{opacity:.4}
.pill{display:inline-block;background:#e6f4f1;color:#17867a;font-weight:800;font-size:14px;padding:6px 14px;border-radius:20px}
.center{text-align:center}
.stdots{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin:14px 0 4px}
.sd{width:30px;height:30px;border-radius:50%;background:#d3e3db;color:#5a7266;display:grid;place-items:center;font-size:14px;font-weight:800}
.sd.done{background:var(--grn2);color:#fff}.sd.cur{background:var(--gold);color:#fff;transform:scale(1.12)}
#musicbtn{position:fixed;top:calc(10px + env(safe-area-inset-top));right:12px;z-index:60;background:#fff;color:var(--grn);border:2px solid var(--grn2);border-radius:22px;font-weight:800;font-size:14px;padding:8px 14px;cursor:pointer;font-family:inherit;box-shadow:0 3px 10px rgba(0,0,0,.12)}
@media(max-width:600px){.qtext{font-size:38px}.timer{font-size:74px}.big{font-size:32px}.lead{font-size:18px}.steps li{font-size:18px}.card{padding:22px 18px;border-radius:16px}}
</style></head><body>
<button id="musicbtn" onclick="toggleMusic()">🔇 音樂 關</button>
<div id="ytwrap" style="position:fixed;left:-9999px;top:0;width:1px;height:1px;overflow:hidden"><div id="ytplayer"></div></div>
<div class="stage"><div class="top" id="top"></div><div class="card" id="card"></div></div>
<div class="nav"><button class="navbtn ghost" id="prev" onclick="go(-1)">‹ 上一頁</button><button class="navbtn" id="next" onclick="go(1)">下一頁 ›</button></div>
<script>
const BLUE="#2E6FBF",GOLD="#C8891F",GREEN="#3F9E5B";
const STATIONS=9;
const SLIDES=[
 {t:"cover"},{t:"howto"},
 {t:"q",cat:"微觀 ‧ 長者個案",c:BLUE,n:1,q:"個案抗拒評估或轉介時，現場如何溝通與引導？",min:2},
 {t:"q",cat:"微觀 ‧ 長者個案",c:BLUE,n:2,q:"發現個案多項（六力）異常時，除了轉介，我可以先做哪些「直接介入」？如何排出優先順序？",min:2},
 {t:"q",cat:"微觀 ‧ 長者個案",c:BLUE,n:3,q:"異常如何連結適切資源，並確保個案真的接上服務？",min:2},
 {t:"q",cat:"宏觀 ‧ 單位與系統",c:GOLD,n:4,q:"如何提升「首評個案」的數量與比率？",min:4},
 {t:"q",cat:"宏觀 ‧ 單位與系統",c:GOLD,n:5,q:"如何提升異常個案的轉介率與轉介完成率？",min:4},
 {t:"q",cat:"宏觀 ‧ 單位與系統",c:GOLD,n:6,q:"如何提升單位「直接介入」的量能與資源？（人力、工具、在地資源盤點、教育訓練）",min:4},
 {t:"q",cat:"宏觀 ‧ 單位與系統",c:GOLD,n:7,q:"如何提升長者回流的後測數與後測率？",min:4},
 {t:"q",cat:"交流 ‧ 不同年資夥伴",c:GREEN,n:8,q:"你想對新進夥伴說的一句話。",min:2},
 {t:"q",cat:"交流 ‧ 不同年資夥伴",c:GREEN,n:9,q:"我想對國健署官方說的一句話。",min:2},
 {t:"move"},{t:"gallery"},{t:"end"}
];
let idx=0,station=1;
// ---------- YouTube background music ----------
var ytPlayer=null,ytReady=false,musicOn=false;
window.onYouTubeIframeAPIReady=function(){
 ytPlayer=new YT.Player('ytplayer',{height:'1',width:'1',videoId:'fL5vZe6cHoc',
   playerVars:{loop:1,playlist:'fL5vZe6cHoc',controls:0,disablekb:1,playsinline:1},
   events:{onReady:function(){ytReady=true;try{ytPlayer.setVolume(35);}catch(e){}}}});
};
(function(){var s=document.createElement('script');s.src="https://www.youtube.com/iframe_api";document.head.appendChild(s);})();
function updMusicBtn(){var b=document.getElementById('musicbtn');if(b){b.textContent=musicOn?'🎵 音樂 開':'🔇 音樂 關';b.style.background=musicOn?'#3F9E5B':'#fff';b.style.color=musicOn?'#fff':'#2E5A3E';}}
function musicPlay(){if(ytReady&&ytPlayer){try{ytPlayer.playVideo();musicOn=true;updMusicBtn();}catch(e){}}}
function musicPause(){if(ytReady&&ytPlayer){try{ytPlayer.pauseVideo();musicOn=false;updMusicBtn();}catch(e){}}}
function toggleMusic(){if(musicOn)musicPause();else musicPlay();}
// ---------- timer ----------
let remain=0,dur=0,running=false,tick=null,actx=null;
function fmt(s){const m=Math.floor(s/60),ss=s%60;return m+":"+String(ss).padStart(2,"0");}
function beep(){try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();const t=actx.currentTime;[880,660].forEach((f,i)=>{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.frequency.value=f;o.start(t+i*.55);g.gain.setValueAtTime(.18,t+i*.55);g.gain.exponentialRampToValueAtTime(.001,t+i*.55+.5);o.stop(t+i*.55+.5);});}catch(e){}}
function paintTimer(){const el=document.getElementById("tdisp");if(!el)return;el.textContent=fmt(remain);el.className="timer"+(remain<=0?" done":(remain<=30?" low":""));const b=document.getElementById("startbtn");if(b){b.textContent=running?"⏸ 暫停":(remain<dur?"▶ 繼續":"▶ 開始");b.className="btn start"+(running?" pause":"");}}
function setupTimer(min){dur=min*60;remain=dur;running=false;clearInterval(tick);}
function startPause(){if(actx&&actx.state==="suspended")actx.resume();if(remain<=0)remain=dur;
 if(running){running=false;clearInterval(tick);}
 else{running=true;musicPlay();tick=setInterval(()=>{remain--;if(remain<=0){remain=0;running=false;clearInterval(tick);beep();}paintTimer();},1000);}
 paintTimer();}
function resetTimer(){running=false;clearInterval(tick);remain=dur;paintTimer();}
function nextStation(){if(station<STATIONS){station++;render();setupTimer(2);startPause();}}
// ---------- render ----------
function render(){
 const s=SLIDES[idx],top=document.getElementById("top"),card=document.getElementById("card");
 clearInterval(tick);running=false;
 if(s.t==="cover"){top.innerHTML="";card.innerHTML=`<div class="center">
   <span class="pill">工作坊 ‧ 第二天</span>
   <div class="big" style="margin-top:16px;font-size:56px">世界咖啡館</div>
   <div class="lead" style="color:var(--mut)">共學共創 ‧ 新版玩法</div>
   <div class="lead" style="margin-top:28px">先在座位上把 9 題討論、寫成 memo，<br>再起身張貼、走 9 站、拍照、交流。</div>
   <div class="lead" style="margin-top:22px;color:var(--grn);font-weight:800">按「下一頁 ›」開始 →</div>
   <div class="memo" style="margin-top:20px;text-align:left">🎵 主持人按「▶ 開始」討論時，會自動播放背景音樂（需連網）；換「下一題／下一頁」就自動停止。右上角可隨時手動開關。</div></div>`;}
 else if(s.t==="howto"){top.innerHTML=`<span>世界咖啡館 ‧ 玩法說明</span>`;card.innerHTML=`
   <ul class="steps">
    <li><span class="num">1</span><div><b>座位討論（先坐著）</b>：依序看 9 題，同桌一起討論。<span class="hl">微觀每題 2 分鐘、宏觀每題 4 分鐘</span>。</div></li>
    <li><span class="num">2</span><div>每一題，把<b>最關鍵的『一個要點』</b>寫在<b>一張 memo</b> 上——<span class="hl">字大、加粗</span>，遠遠就看得到。</div></li>
    <li><span class="num">3</span><div><b>起身張貼</b>：9 題都寫完後，帶著 memo 去貼到對應的主題看板。</div></li>
    <li><span class="num">4</span><div><b>走 9 站</b>：到每一站 <span class="hl">📷 拍照、👀 觀看、💭 想想、💬 討論</span>，每站約 2 分鐘、<span class="hl">2–3 個組別</span>一起。</div></li>
   </ul>
   <div class="memo" style="margin-top:16px">⏱ 每個畫面都有大型倒數計時器＋背景音樂；時間到會有提示音。</div>`;}
 else if(s.t==="q"){
   top.innerHTML=`<span>世界咖啡館 ‧ 座位討論</span><span class="sp">第 ${s.n} / 9 題</span>`;
   card.innerHTML=`<div>
     <span class="chip" style="background:${s.c}">${s.cat}　${s.min} 分鐘</span>
     <div class="qn">第 ${s.n} 題</div>
     <div class="qtext">${s.q}</div>
     <div class="memo">✍️ 討論後，把最關鍵的『一個要點』寫在一張 memo 上——<b>字大、加粗！</b></div>
     <div class="timerwrap"><div class="timer" id="tdisp">0:00</div>
       <div class="tbtns"><button class="btn start" id="startbtn" onclick="startPause()">▶ 開始</button>
       <button class="btn reset" onclick="resetTimer()">↻ 重設</button></div></div></div>`;
   setupTimer(s.min);paintTimer();}
 else if(s.t==="move"){top.innerHTML=`<span>世界咖啡館 ‧ 起身張貼</span>`;card.innerHTML=`<div class="center">
   <div style="font-size:52px">🚶‍♀️🚶‍♂️</div>
   <div class="big" style="margin-top:8px">9 題都寫完了，起身囉！</div>
   <div class="lead" style="margin-top:14px">請帶著你的 memo，把它們<b>張貼到對應的主題看板</b>上：</div>
   <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:18px">
     <span class="chip" style="background:${BLUE}">微觀 ‧ 長者個案</span>
     <span class="chip" style="background:${GOLD}">宏觀 ‧ 單位與系統</span>
     <span class="chip" style="background:${GREEN}">交流 ‧ 不同年資</span></div>
   <div class="lead" style="margin-top:20px;color:var(--mut)">貼好後，按「下一頁 ›」開始走 9 站。</div></div>`;}
 else if(s.t==="gallery"){
   top.innerHTML=`<span>世界咖啡館 ‧ 走關卡</span><span class="sp">第 ${station} / ${STATIONS} 站</span>`;
   let dots='';for(let i=1;i<=STATIONS;i++)dots+=`<div class="sd ${i<station?'done':i===station?'cur':''}">${i}</div>`;
   card.innerHTML=`<div class="center">
     <div class="big">第 ${station} 站</div>
     <div class="stdots">${dots}</div>
     <div class="lead" style="margin-top:6px">本站 <b>2–3 個組別</b> 一起——</div>
     <div style="display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin:12px 0;font-size:22px;font-weight:800;color:var(--grn)">
       <span>📷 拍照</span><span>👀 觀看</span><span>💭 想想</span><span>💬 討論</span></div>
     <div class="timerwrap"><div class="timer" id="tdisp">2:00</div>
       <div class="tbtns"><button class="btn start" id="startbtn" onclick="startPause()">▶ 開始</button>
       <button class="btn reset" onclick="resetTimer()">↻ 重設</button>
       <button class="btn nextst" onclick="nextStation()" ${station>=STATIONS?'disabled style="opacity:.4"':''}>下一站 →</button></div>
       <div class="lead" style="margin-top:10px;color:var(--mut);font-size:16px">${station>=STATIONS?'已是最後一站，按「下一頁 ›」結束。':'看完按「下一站 →」，自動換站並開始計時。'}</div>
     </div></div>`;
   setupTimer(2);paintTimer();}
 else if(s.t==="end"){top.innerHTML="";card.innerHTML=`<div class="center">
   <div style="font-size:52px">🌱</div>
   <div class="big" style="margin-top:8px">謝謝大家的共創</div>
   <div class="lead" style="margin-top:14px">把牆上的智慧拍下來、帶回你的單位，<br>讓今天的討論，變成明天的行動。</div>
   <div class="lead" style="margin-top:20px;color:var(--grn);font-weight:800">六力城市探索隊 2026 ‧ 世界咖啡館</div></div>`;}
 document.getElementById("prev").disabled=(idx===0);
 document.getElementById("next").disabled=(idx===SLIDES.length-1);
}
function go(d){const n=idx+d;if(n<0||n>=SLIDES.length)return;
 musicPause();
 if(SLIDES[n].t==="gallery"&&SLIDES[idx].t!=="gallery")station=1;
 idx=n;running=false;clearInterval(tick);render();window.scrollTo(0,0);}
document.addEventListener("keydown",e=>{
 if(e.key==="ArrowRight"||e.key==="PageDown"){go(1);}
 else if(e.key==="ArrowLeft"||e.key==="PageUp"){go(-1);}
 else if(e.key===" "){e.preventDefault();const b=document.getElementById("startbtn");if(b)startPause();}
});
render();
</script></body></html>
